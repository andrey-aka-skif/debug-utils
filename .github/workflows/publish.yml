name: Publish

# Публикация в GitHub Packages.
# Версия берётся из git-тега vX.Y.Z (в манифесте всегда 0.0.0).
# Триггеры:
#   - publish GitHub Release (тег релиза → версия пакета);
#   - ручной запуск с указанием тега — для пересборки/переиздания старого коммита.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег для сборки и публикации (формат vX.Y.Z)'
        required: true
      npm-tag:
        description: >
          dist-tag для ручной публикации. По умолчанию replay — паркинг-тег,
          который НЕ сдвигает latest (нужно при пересборке/бэкфилле старой версии).
        required: false
        default: replay

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (по тегу события или указанному вручную)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # registry-url + scope → setup-node пишет scoped-строку @andrey-aka-skif:registry=…
      # (не дефолтный реестр) и auth через NODE_AUTH_TOKEN. Committed .npmrc не нужен.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com
          scope: '@andrey-aka-skif'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Проставить версию из тега (манифест остаётся 0.0.0 в git)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$'; then
            echo "Тег '$TAG' не соответствует формату vX.Y.Z" >&2
            exit 1
          fi
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      # dist-tag: релиз → latest; ручной запуск → npm-tag (по умолчанию replay),
      # чтобы пересборка старой версии не сдвигала latest.
      # Автоматический GITHUB_TOKEN (прав packages:write достаточно для публикации).
      - name: Publish to GitHub Packages
        env:
          NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.npm-tag || 'latest' }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --tag "$NPM_TAG"
